<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Customly — Прикраси Pandora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">Customly <span>✦</span></div>
    <div class="header-badge">
      <i class="fas fa-lock"></i> Безпечне замовлення
    </div>
  </div>
</header>

<!-- ── HERO (compact, above the fold) ── -->
<section class="hero">
  <!-- <p class="hero-eyebrow">✦ &nbsp;Оригінальний Pandora &nbsp;✦</p> -->
  <h1>Прикраси, що<br /><em>розповідають вашу</em> історію</h1>

  <div class="search-wrap">
    <input
      type="search"
      id="searchInput"
      placeholder="Артикул або назва…"
      autocomplete="off"
      oninput="handleSearch()"
    />
    <button class="search-btn" onclick="handleSearch()">
      <i class="fas fa-search"></i>
    </button>
  </div>
</section>

<!-- ── CATALOG ── -->
<main class="catalog" id="catalog">
  <div class="catalog-header">
    <h2 class="catalog-title">Каталог</h2>
    <span id="resultCount" class="result-count"></span>
  </div>
  <div class="products-grid" id="productsGrid"></div>
  <div class="no-results" id="noResults" style="display:none;">
    <i class="far fa-gem"></i>
    <p>Нічого не знайдено.</p>
  </div>
</main>

<!-- ── ORDER MODAL ── -->
<div class="modal-backdrop" id="modalBackdrop" onclick="handleBackdropClick(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Оформлення замовлення">
    <button class="modal-close" onclick="closeModal()" aria-label="Закрити">
      <i class="fas fa-times"></i>
    </button>

    <!-- Product preview -->
    <div class="modal-product-preview">
      <div class="modal-img-wrap" id="modalMediaWrap">
        <!-- заповнюється через JS: відео або фото -->
      </div>
      <div class="modal-product-info">
        <h4 id="modalProductName">—</h4>
        <p class="modal-article" id="modalProductArticle">—</p>
        <p class="modal-price" id="modalProductPrice">—</p>
      </div>
    </div>

    <!-- Order form -->
    <div id="modalForm">
      <h2 class="modal-title">Швидке замовлення</h2>

      <div class="form-group">
        <label for="fName">Ім'я</label>
        <input type="text" id="fName" placeholder="Ваше ім'я" autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label for="fPhone">Телефон</label>
        <input type="tel" id="fPhone" placeholder="+380 __ ___ __ __" autocomplete="tel" inputmode="tel" />
      </div>
      <div class="form-group">
        <label for="fCity">Місто</label>
        <input type="text" id="fCity" placeholder="Ваше місто" autocomplete="address-level2" />
      </div>

      <button class="btn-submit" id="submitBtn" onclick="processOrder()">
        <span class="btn-text">✦ Підтвердити замовлення</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>

      <!-- <p class="form-note">
        <i class="fas fa-shield-alt"></i>
        Оплата при отриманні · Доставка 1–3 дні
      </p>
    </div> -->

    <!-- Success screen -->
    <div class="modal-success" id="modalSuccess">
      <div class="success-icon"><i class="fas fa-check"></i></div>
      <h3>Замовлення прийнято!</h3>
      <p>Ми зв'яжемося з вами <strong>найближчим часом</strong>.</p>
      <button class="btn-close-success" onclick="closeModal()">Закрити</button>
    </div>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer class="site-footer">
  <p>© 2026 Customly · <a href="https://t.me/m2300m" target="_blank" rel="noopener"><!-- @m2300m --></a></p>
</footer>

<script src="script.js"></script>
</body>
</html>
